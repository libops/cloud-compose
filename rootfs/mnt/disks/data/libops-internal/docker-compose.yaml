networks:
  internal:
services:
  lightsout:
    image: ghcr.io/libops/lightsout:main@sha256:4d38ac380c86514d72efbcce0af9ea8ffd7ff86e97abea3d0b3c946cf204eaae
    ports:
      - "8808:8808"
    networks:
      - internal
    restart: unless-stopped
    environment:
      INACTIVITY_TIMEOUT: 90
      GCP_PROJECT: ${GCP_PROJECT}
      GCP_ZONE: ${GCP_ZONE}
      GCP_INSTANCE_NAME: ${GCP_INSTANCE_NAME}
      GOOGLE_APPLICATION_CREDENTIALS: /app/GOOGLE_APPLICATION_CREDENTIALS
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/disks/data:/mnt/disks/data
      - ./GOOGLE_APPLICATION_CREDENTIALS:/app/GOOGLE_APPLICATION_CREDENTIALS:r
  cadvisor:
    image: ghcr.io/google/cadvisor:0.56.2@sha256:5534ae91cbf3428998d60428d107cfdd97272d80658534ac6e54d8ce3b0c4d72
    command:
      - -disable_metrics
      - cpu_topology,referenced_memory,disk,memory_numa,perf_event,sched,tcp,udp
      - -store_container_labels
      - "false"
    privileged: true
    devices:
      - /dev/kmsg
    networks:
      - internal
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /mnt/disks/data/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
  cap:
    image: ghcr.io/libops/cap:main@sha256:4deac712f87db480a2c668a5638492c0ff221b9c599175f1772ac44480d1bc9e
    networks:
      - internal
    restart: unless-stopped
    environment:
      GCP_PROJECT: ${GCP_PROJECT}
      GCP_ZONE: ${GCP_ZONE}
      GCP_INSTANCE_NAME: ${GCP_INSTANCE_NAME}
      CADVISOR_HOST: "cadvisor:8080"
      GOOGLE_APPLICATION_CREDENTIALS: /app/GOOGLE_APPLICATION_CREDENTIALS
    volumes:
      - ./GOOGLE_APPLICATION_CREDENTIALS:/app/GOOGLE_APPLICATION_CREDENTIALS:r
    depends_on:
      - cadvisor
